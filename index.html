<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>md/ — lector de markdown</title>
<meta name="description" content="Sube un archivo .md y léelo con foco, como notas bajo una lámpara.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="progress" id="progress"></div>

<div class="shell">

  <aside class="rail">
    <div class="mark">md<span>/</span></div>

    <div class="card" id="dropzone">
      <p class="card-title">suelta un .md</p>
      <p class="card-sub">o hacé click para elegir un archivo</p>
      <input type="file" id="fileInput" accept=".md,.markdown,text/markdown,text/plain" hidden>
    </div>

    <button class="link-btn" id="pasteToggle" type="button">pegar texto en vez de subir</button>
    <div class="paste-box" id="pasteBox" hidden>
      <textarea id="pasteArea" placeholder="pegá tu markdown acá..." spellcheck="false"></textarea>
      <button class="btn" id="pasteRender" type="button">renderizar</button>
    </div>

    <div class="meta" id="meta" hidden>
      <p class="meta-name" id="metaName"></p>
      <p class="meta-stats" id="metaStats"></p>
      <button class="link-btn" id="clearBtn" type="button">quitar documento</button>
    </div>

    <nav class="toc" id="toc" hidden>
      <p class="toc-title">en esta página</p>
      <ol id="tocList"></ol>
    </nav>
  </aside>

  <main class="reading">
    <div class="lamp" aria-hidden="true"></div>

    <section class="empty" id="emptyState">
      <p class="empty-eyebrow">md/ lector</p>
      <h1>Nada que leer todavía</h1>
      <p class="empty-body">Pensado para repasar apuntes propios antes de una exposición o un examen: cargá un .md y quedan la letra, la lámpara y vos.</p>
    </section>

    <article class="content" id="content" hidden></article>
  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="app.js"></script>
</body>
</html>
